name: Build Windows EXE

on:
  push:
    branches:
      - claude/temp-monitor-exe-3bbwv2
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psutil nuitka ordered-set zstandard

      - name: Download LibreHardwareMonitor DLL
        shell: powershell
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/LibreHardwareMonitor/LibreHardwareMonitor/releases/latest"
          $zipUrl   = ($releases.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1).browser_download_url
          Write-Output "Downloading: $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile lhm.zip
          Expand-Archive -Path lhm.zip -DestinationPath lhm_dir -Force
          $dll = Get-ChildItem -Path lhm_dir -Filter "LibreHardwareMonitorLib.dll" -Recurse | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "LibreHardwareMonitorLib.dll"
          Write-Output "DLL hazir: $(Test-Path 'LibreHardwareMonitorLib.dll')"

      - name: Build with Nuitka
        run: >
          python -m nuitka
          --onefile
          --windows-console-mode=disable
          --windows-uac-admin
          --enable-plugin=tk-inter
          --include-data-files=LibreHardwareMonitorLib.dll=LibreHardwareMonitorLib.dll
          --output-filename=HWMonitor.exe
          --assume-yes-for-downloads
          --company-name="HWMonitorPro"
          --product-name="HWMonitor Pro"
          --file-description="Donanim Sicaklik Monitoru"
          --file-version=1.0.0.0
          --product-version=1.0.0.0
          temp_monitor.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HWMonitor-Windows
          path: HWMonitor.exe
          if-no-files-found: error

      - name: Commit EXE to branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add HWMonitor.exe
          git diff --cached --quiet || git commit -m "ci: HWMonitor.exe Nuitka build [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
